[project]
name = "fundamental-dashboard"
version = "0.1.0"
description = "A terminal-based stock fundamental analysis dashboard using Rich and Yahoo Finance."
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "yfinance>=0.2.30",
    "pandas>=2.0",
    "rich>=13.0",
]

[project.scripts]
dashboard = "dashboard.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/dashboard"]
